<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Trabajadores</title>
<link rel="stylesheet" href="/style.css">

</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="inicio()">🏠 Inicio</button>
</div>

<div class="container">

<h2>👷 Gestión Trabajadores</h2>

<div class="form">

<input id="nombre" placeholder="Nombre completo">

<input id="cedula" placeholder="Cédula">

<input id="telefono" placeholder="Teléfono">

<input id="cargo" placeholder="Cargo">

<select id="contratista">
<option value="">Seleccionar contratista</option>
</select>

<button id="btnGuardar" class="btn-guardar" onclick="guardar()">
Guardar
</button>

</div>


<table>

<thead>
<tr>

<th>Nombre</th>
<th>Cédula</th>
<th>Cargo</th>
<th>Contratista</th>
<th>Acción</th>

</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>


<script>

const API = window.location.origin;

// guarda el id cuando estamos editando
let editandoId = null;


// volver inicio
function inicio(){
  window.location.href = "/";
}


// cargar contratistas
async function cargarContratistas(){

  const res = await fetch(`${API}/contratistas`);
  const data = await res.json();

  let html =
  `<option value="">Seleccionar contratista</option>`;

  data.forEach(c => {

    html += `
      <option value="${c.id}">
        ${c.nombre}
      </option>
    `;

  });

  document.getElementById("contratista").innerHTML = html;
}



// guardar o actualizar trabajador
async function guardar(){

  const nombre = document.getElementById("nombre").value;
  const cedula = document.getElementById("cedula").value;
  const telefono = document.getElementById("telefono").value;
  const cargo = document.getElementById("cargo").value;
  const contratista_id = document.getElementById("contratista").value;

  if(!nombre || !cedula || !telefono || !cargo || !contratista_id){

    alert("Completa todos los datos");
    return;

  }

  // EDITAR
  if(editandoId){

    await fetch(`${API}/trabajadores`, {

      method:'PUT',

      headers:{
        'Content-Type':'application/json'
      },

      body: JSON.stringify({

        id: editandoId,
        nombre,
        cedula,
        telefono,
        cargo,
        contratista_id

      })

    });

    alert("Trabajador actualizado");

  }

  // NUEVO
  else{

    await fetch(`${API}/trabajadores`, {

      method:'POST',

      headers:{
        'Content-Type':'application/json'
      },

      body: JSON.stringify({

        nombre,
        cedula,
        telefono,
        cargo,
        contratista_id

      })

    });

    alert("Trabajador guardado");

  }

  limpiar();
  cargar();

}



// editar trabajador
function editar(t){

  editandoId = t.id;

  document.getElementById("nombre").value = t.nombre;
  document.getElementById("cedula").value = t.cedula;
  document.getElementById("telefono").value = t.telefono;
  document.getElementById("cargo").value = t.cargo;
  document.getElementById("contratista").value = t.contratista_id;

  document.getElementById("btnGuardar").innerText =
  "Actualizar";

}



// eliminar
async function eliminar(id){

  if(!confirm("Eliminar trabajador?")) return;

  await fetch(`${API}/trabajadores/` + id, {
    method:'DELETE'
  });

  cargar();

}



// limpiar
function limpiar(){

  editandoId = null;

  document.getElementById("nombre").value = "";
  document.getElementById("cedula").value = "";
  document.getElementById("telefono").value = "";
  document.getElementById("cargo").value = "";
  document.getElementById("contratista").value = "";

  document.getElementById("btnGuardar").innerText =
  "Guardar";

}



// cargar trabajadores
async function cargar(){

  const res = await fetch(`${API}/trabajadores`);
  const data = await res.json();

  let html = '';

  if(data.length === 0){

    html = `
    <tr>
      <td colspan="5">No hay trabajadores</td>
    </tr>
    `;

  }

  data.forEach(t => {

    html += `

      <tr>

      <td>${t.nombre}</td>

      <td>${t.cedula}</td>

      <td>${t.cargo}</td>

      <td>${t.contratista}</td>

      <td>

      <button onclick='editar(${JSON.stringify(t)})'>
      ✏
      </button>

      <button
      class="btn-eliminar"
      onclick="eliminar(${t.id})">

      ❌

      </button>

      </td>

      </tr>

    `;

  });

  document.getElementById("tabla").innerHTML = html;

}


// iniciar
cargarContratistas();
cargar();

</script>

</body>
</html>
