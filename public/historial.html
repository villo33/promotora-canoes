<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Historial Asistencia</title>
<link rel="stylesheet" href="/style.css">

<style>

select,input{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:1px solid #ccc;
}

.estado-presente{ color:green; font-weight:bold; }
.estado-ausente{ color:red; font-weight:bold; }
.estado-permiso{ color:orange; font-weight:bold; }
.estado-incapacidad{ color:purple; font-weight:bold; }
.estado-vacaciones{ color:blue; font-weight:bold; }

</style>

</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="inicio()">🏠 Inicio</button>
</div>

<div class="container">

<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">

  <h2 style="margin:0;">📊 Historial de Asistencia</h2>

  <button class="btn-pdf" onclick="generarPDF()">
    📄 Descargar PDF
  </button>

</div>

<div class="form">

<select id="contratista" onchange="filtrar()">
<option value="">Todos los contratistas</option>
</select>

<input type="date" id="fecha" onchange="filtrar()">

</div>

<table>

<thead>
<tr>
<th>Fecha</th>
<th>Contratista</th>
<th>Trabajador</th>
<th>Cédula</th>
<th>Cargo</th>
<th>Estado</th>
<th>Observación</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

<script>

const API = window.location.origin;
let datosGlobal = [];

// volver
function inicio(){
  window.location.href="/";
}

// formatear fecha
function formatearFecha(fechaDB){
  if(!fechaDB) return "-";
  const d = fechaDB.substring(0,10).split("-");
  return `${d[2]}/${d[1]}/${d[0]}`;
}

// cargar contratistas
async function cargarContratistas(){

  const res = await fetch(`${API}/contratistas`);
  const data = await res.json();

  let html = `<option value="">Todos los contratistas</option>`;

  data.forEach(c=>{
    html += `<option value="${c.nombre}">${c.nombre}</option>`;
  });

  document.getElementById("contratista").innerHTML = html;
}

// cargar historial
async function cargar(){

  const res = await fetch(`${API}/asistencia`);
  const data = await res.json();

  datosGlobal = data;
  renderTabla(data);
}

// filtrar
function filtrar(){

  const contratista = document.getElementById("contratista").value;
  const fecha = document.getElementById("fecha").value;

  let filtrado = datosGlobal;

  if(contratista){
    filtrado = filtrado.filter(d => d.contratista === contratista);
  }

  if(fecha){
    filtrado = filtrado.filter(d => d.fecha.substring(0,10) === fecha);
  }

  renderTabla(filtrado);
}

// render tabla
function renderTabla(data){

  let html = '';

  if(!data.length){
    html = `<tr><td colspan="7">No hay registros</td></tr>`;
    document.getElementById("tabla").innerHTML = html;
    return;
  }

  data.forEach(r=>{
    html += `
<tr>
<td>${formatearFecha(r.fecha)}</td>
<td>${r.contratista}</td>
<td>${r.nombre}</td>
<td>${r.cedula}</td>
<td>${r.cargo}</td>
<td class="estado-${r.estado}">${r.estado}</td>
<td>${r.observacion || '-'}</td>
</tr>
`;
  });

  document.getElementById("tabla").innerHTML = html;
}

// ================= PDF CON LOGO =================
async function generarPDF(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  // 🔥 LOGO
  const img = new Image();
  img.src = "/logo.png";

  img.onload = function(){

    doc.addImage(img, "PNG", 10, 5, 25, 25);

    doc.setFontSize(14);
    doc.text("PROMOTORA CANOES", 40, 15);

    doc.setFontSize(11);
    doc.text("Historial de Asistencia", 40, 22);

    const filas = datosGlobal.map(r=>[
      formatearFecha(r.fecha),
      r.contratista,
      r.nombre,
      r.cedula,
      r.cargo,
      r.estado,
      r.observacion || "-"
    ]);

    doc.autoTable({
      head:[["Fecha","Contratista","Trabajador","Cédula","Cargo","Estado","Observación"]],
      body:filas,
      startY:35,
      styles:{ fontSize:8 }
    });

    doc.save("historial-asistencia.pdf");
  };

}

// init
cargarContratistas();
cargar();

</script>

</body>
</html>
