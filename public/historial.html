<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Historial Asistencia</title>
<link rel="stylesheet" href="style.css">

<style>

select,input{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:1px solid #ccc;
}

.estado-presente{
  color:green;
  font-weight:bold;
}

.estado-ausente{
  color:red;
  font-weight:bold;
}

.estado-permiso{
  color:orange;
  font-weight:bold;
}

.estado-incapacidad{
  color:purple;
  font-weight:bold;
}

.estado-vacaciones{
  color:blue;
  font-weight:bold;
}

/* linea separadora */
.separador-fecha td{
  border-top:4px solid #d1d5db;
}

</style>

</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="inicio()">🏠 Inicio</button>
</div>

<div class="container">

<h2>📊 Historial de Asistencia</h2>

<div class="form">

<select id="contratista" onchange="filtrar()">
<option value="">Todos los contratistas</option>
</select>

<input type="date" id="fecha" onchange="filtrar()">

</div>

<table>

<thead>

<tr>
<th>Fecha</th>
<th>Contratista</th>
<th>Trabajador</th>
<th>Cédula</th>
<th>Cargo</th>
<th>Estado</th>
<th>Observación</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>


<script>

const API = window.location.origin;
let datosGlobal = [];


// volver
function inicio(){
  window.location.href="/";
}


// FORMATEAR FECHA (corregido)
function formatearFecha(fechaDB){

  if(!fechaDB) return "-";

  // convertir a texto por seguridad
  fechaDB = String(fechaDB);

  // caso: 2026-06-21
  if(fechaDB.includes("-")){

    const soloFecha = fechaDB.substring(0,10);

    const partes = soloFecha.split("-");

    if(partes.length === 3){
      return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }
  }

  // caso: ya viene 21/06/2026
  if(fechaDB.includes("/")){
    return fechaDB;
  }

  // fallback
  return fechaDB;
}


// cargar contratistas
async function cargarContratistas(){

  const res = await fetch(`${API}/contratistas`);
  const data = await res.json();

  let html = `
    <option value="">
      Todos los contratistas
    </option>
  `;

  data.forEach(c => {

    html += `
      <option value="${c.nombre}">
        ${c.nombre}
      </option>
    `;

  });

  document.getElementById("contratista").innerHTML = html;
}



// cargar historial
async function cargar(){

  const res = await fetch(`${API}/asistencia`);
  const data = await res.json();

  datosGlobal = data;

  renderTabla(data);

}



// filtrar
function filtrar(){

  const contratista =
  document.getElementById("contratista").value;

  const fecha =
  document.getElementById("fecha").value;

  let filtrado = datosGlobal;


  if(contratista){

    filtrado = filtrado.filter(d =>
      d.contratista === contratista
    );

  }


  if(fecha){

    filtrado = filtrado.filter(d =>
      String(d.fecha).substring(0,10) === fecha
    );

  }

  renderTabla(filtrado);

}




// pintar tabla
function renderTabla(data){

  let html = '';

  if(data.length === 0){

    html = `
      <tr>
        <td colspan="7">
          No hay registros
        </td>
      </tr>
    `;

    document.getElementById("tabla").innerHTML = html;
    return;
  }


  let fechaAnterior = "";

  data.forEach(r => {

    let fechaActual = String(r.fecha).substring(0,10);


    // si cambia fecha → agregar linea separadora
    let clase = "";

    if(fechaAnterior && fechaActual !== fechaAnterior){
      clase = "separador-fecha";
    }

    fechaAnterior = fechaActual;


    html += `

<tr class="${clase}">

<td>${formatearFecha(r.fecha)}</td>

<td>${r.contratista}</td>

<td>${r.nombre}</td>

<td>${r.cedula}</td>

<td>${r.cargo}</td>

<td class="estado-${r.estado}">
${r.estado}
</td>

<td>
${r.observacion || '-'}
</td>

</tr>

`;

  });


  document.getElementById("tabla").innerHTML = html;

}


cargarContratistas();
cargar();

</script>

</body>
</html>
