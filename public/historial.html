<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Historial Asistencia</title>
<link rel="stylesheet" href="style.css">

<style>

select,input{
  padding:10px;
  width:250px;
  border-radius:8px;
  border:1px solid #ccc;
}

.estado-presente{
  color:green;
  font-weight:bold;
}

.estado-ausente{
  color:red;
  font-weight:bold;
}

.estado-permiso{
  color:orange;
  font-weight:bold;
}

.estado-incapacidad{
  color:purple;
  font-weight:bold;
}

.estado-vacaciones{
  color:blue;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="inicio()">🏠 Inicio</button>
</div>

<div class="container">

<h2>📊 Historial de Asistencia</h2>

<div class="form">

<select id="contratista" onchange="filtrar()">
<option value="">Todos los contratistas</option>
</select>

<input type="date" id="fecha" onchange="filtrar()">

</div>

<table>

<thead>

<tr>
<th>Fecha</th>
<th>Contratista</th>
<th>Trabajador</th>
<th>Cédula</th>
<th>Cargo</th>
<th>Estado</th>
<th>Observación</th>
</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>


<script>

const API = window.location.origin;
let datosGlobal = [];


// volver
function inicio(){
  window.location.href="/";
}


// formatear fecha bonita
function formatearFecha(fechaDB){

  const fecha = new Date(fechaDB);

  const dia = String(fecha.getDate()).padStart(2,'0');
  const mes = String(fecha.getMonth() + 1).padStart(2,'0');
  const anio = fecha.getFullYear();

  return `${dia}/${mes}/${anio}`;
}


// cargar contratistas
async function cargarContratistas(){

  const res = await fetch(`${API}/contratistas`);
  const data = await res.json();

  let html = `
    <option value="">
      Todos los contratistas
    </option>
  `;

  data.forEach(c => {

    html += `
      <option value="${c.nombre}">
        ${c.nombre}
      </option>
    `;

  });

  document.getElementById("contratista").innerHTML = html;
}



// cargar historial
async function cargar(){

  const res = await fetch(`${API}/asistencia`);
  const data = await res.json();

  datosGlobal = data;

  renderTabla(data);

}



// filtrar
function filtrar(){

  const contratista =
  document.getElementById("contratista").value;

  const fecha =
  document.getElementById("fecha").value;

  let filtrado = datosGlobal;


  // filtrar contratista
  if(contratista){

    filtrado = filtrado.filter(d =>
      d.contratista === contratista
    );

  }


  // filtrar fecha
  if(fecha){

    filtrado = filtrado.filter(d =>
      d.fecha.substring(0,10) === fecha
    );

  }

  renderTabla(filtrado);

}



// pintar tabla
function renderTabla(data){

  let html = '';

  if(data.length === 0){

    html = `
      <tr>
        <td colspan="7">
          No hay registros
        </td>
      </tr>
    `;

  }


  data.forEach(r => {

    html += `

<tr>

<td>${r.fecha}</td>

<td>${r.contratista}</td>

<td>${r.nombre}</td>

<td>${r.cedula}</td>

<td>${r.cargo}</td>

<td class="${
  r.estado === 'presente'
  ? 'estado-presente'
  : 'estado-ausente'
}">
${r.estado}
</td>

<td>
${r.observacion || '-'}
</td>

</tr>
`;

  });


  document.getElementById("tabla").innerHTML = html;

}


cargarContratistas();
cargar();

</script>

</body>
</html>
