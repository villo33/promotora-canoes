<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Ingresos</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="top-bar">
  <button class="btn-inicio" onclick="inicio()">🏠 Inicio</button>
</div>

<div class="container">

<h2>🚪 Registro Ingreso Personal</h2>

<div class="form">

<select id="trabajador">
<option value="">Seleccionar trabajador</option>
</select>

<button class="btn-guardar" onclick="registrar()">
Registrar Ingreso
</button>

</div>


<table>

<thead>

<tr>

<th>Nombre</th>
<th>Cédula</th>
<th>Contratista</th>
<th>Fecha</th>
<th>Hora</th>
<th>Acción</th>

</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

</div>


<script>

const API = window.location.origin;


// volver inicio
function inicio(){
  window.location.href = "/";
}


// cargar trabajadores
async function cargarTrabajadores(){

  const res = await fetch(`${API}/trabajadores`);

  const data = await res.json();

  let html =
  `<option value="">Seleccionar trabajador</option>`;

  data.forEach(t => {

    html += `
      <option value="${t.id}">
        ${t.nombre} - ${t.cedula}
      </option>
    `;

  });

  document.getElementById("trabajador").innerHTML = html;
}



// registrar ingreso
async function registrar(){

  const trabajador_id =
  document.getElementById("trabajador").value;

  if(!trabajador_id){

    alert("Selecciona trabajador");
    return;

  }

  await fetch(`${API}/ingresos`, {

    method:'POST',

    headers:{
      'Content-Type':'application/json'
    },

    body: JSON.stringify({
      trabajador_id
    })

  });

  cargar();

}



// eliminar ingreso
async function eliminar(id){

  if(!confirm("Eliminar registro ingreso?")) return;

  await fetch(`${API}/ingresos/` + id, {
    method:'DELETE'
  });

  cargar();

}



// cargar historial
async function cargar(){

  const res = await fetch(`${API}/ingresos`);

  const data = await res.json();

  let html = '';

  if(data.length === 0){

    html = `
      <tr>
        <td colspan="6">
          No hay ingresos registrados
        </td>
      </tr>
    `;

  }

  data.forEach(i => {

    html += `

      <tr>

      <td>${i.nombre}</td>

      <td>${i.cedula}</td>

      <td>${i.contratista}</td>

      <td>${i.fecha}</td>

      <td>${i.hora}</td>

      <td>

      <button
      class="btn-eliminar"
      onclick="eliminar(${i.id})">

      ❌

      </button>

      </td>

      </tr>

    `;

  });

  document.getElementById("tabla").innerHTML = html;

}



// iniciar
cargarTrabajadores();
cargar();

</script>

</body>
</html>
